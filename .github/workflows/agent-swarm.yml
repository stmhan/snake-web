name: Claude Agent Swarm

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ensure-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create required labels if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for label in "agent:implement" "agent:in-progress" "agent:fixing" "agent:need-fix" "agent:need-review"; do
            gh label create "$label" --color "6f42c1" --description "Agent Swarm lifecycle label" --force
          done

  architect:
    needs: ensure-labels
    if: >-
      github.event_name == 'issues' &&
      github.event.label.name == 'agent:implement'
    runs-on: [self-hosted, claude-max]
    concurrency:
      group: agent-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run architect agent
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: python .github/scripts/architect.py ${{ github.event.issue.number }} "${{ github.event.issue.title }}"

  critic:
    needs: ensure-labels
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.action != 'labeled' &&
       !contains(github.event.pull_request.title, '[skip-review]') &&
       !contains(join(github.event.pull_request.labels.*.name, ','), 'agent:fixing')) ||
      (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'agent:need-review')
    runs-on: [self-hosted, claude-max]
    concurrency:
      group: agent-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove need-review label
        if: github.event.action == 'labeled' && github.event.label.name == 'agent:need-review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "agent:need-review"

      - name: Run critic agent
        id: critic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/critic.py ${{ github.event.pull_request.number }}

      - name: Signal janitor if changes requested
        if: steps.critic.outputs.review_result == 'CHANGES REQUESTED'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "agent:need-fix"

  janitor:
    needs: ensure-labels
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'agent:need-fix') ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested' &&
       github.event.review.user.type != 'Bot')
    runs-on: [self-hosted, claude-max]
    concurrency:
      group: agent-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove need-fix label
        if: github.event.action == 'labeled' && github.event.label.name == 'agent:need-fix'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "agent:need-fix"

      - name: Add fixing label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "agent:fixing"

      - name: Run janitor agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/janitor.py ${{ github.event.pull_request.number }}

      - name: Remove fixing label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "agent:fixing"

      - name: Signal critic for re-review
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "agent:need-review"
